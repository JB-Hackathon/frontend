name: Notify main module

on:
  # main으로 PR이 병합되면 push 이벤트가 발생하므로 병합 후 이 workflow가 실행됩니다.
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch main module update workflow
        run: |
          # 메인 모듈 저장소에 이 서브모듈 포인터만 업데이트하라고 요청합니다.
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.MAINMODULE_TOKEN }}" \
            https://api.github.com/repos/JB-Hackathon/JB-Hackathon/dispatches \
            -d '{"event_type":"submodule-main-updated","client_payload":{"repository":"${{ github.repository }}","sha":"${{ github.sha }}"}}'
